# 12 cascades, 24 channels, jointly trained at 4x/5x/6x random undersampling

mask_type: random
center_fractions: [0.08, 0.08, 0.08]
accelerations: [4, 5, 6]

num_cascades: 12
chans: 24
pools: 4
sens_chans: 8
sens_pools: 4
use_dc: true

epochs: 50
batch_size: 1
lr: 3.0e-4
lr_step_size: 40
lr_gamma: 0.1
seed: 42
