# Single-slice baseline with larger U-Net capacity (matched to big joint-contrast)
# Jointly trained at 4x/5x/6x random undersampling

mask_type: random
center_fractions: [0.08, 0.08, 0.08]
accelerations: [4, 5, 6]

num_cascades: 12
chans: 48
pools: 4
sens_chans: 16
sens_pools: 4
use_dc: true

epochs: 30
batch_size: 1
lr: 3.0e-4
lr_step_size: 20
lr_gamma: 0.1
seed: 42
